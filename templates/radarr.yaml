kind: Template
name: radarr
description: Movie collection manager for Usenet and BitTorrent users
category: media
icon: https://raw.githubusercontent.com/Radarr/Radarr/develop/Logo/128.png
image: lscr.io/linuxserver/radarr:latest
ports:
  - "7878"
volumes:
  - /config
nas_volumes:
  - name: movies
    suggested_path: /movies
    description: Movies library
  - name: downloads
    suggested_path: /downloads
    description: Download directory
env:
  TZ: Etc/UTC
  PUID: "1000"
  PGID: "1000"
homepage_labels:
  homepage.group: Media
  homepage.name: Radarr
  homepage.icon: radarr
  homepage.href: "https://{{domain}}"
